{% if patients %}
<div class="list-group">
    {% for patient in patients %}
    <a href="#" class="list-group-item list-group-item-action patient-select"
       data-patient-id="{{ patient.id }}"
       data-patient-name="{{ patient.name }}"
       data-patient-patient-id="{{ patient.patient_id }}"
       data-patient-phone="{{ patient.phone_number }}">
        <div class="d-flex justify-content-between align-items-center">
            <div>
                <strong>{{ patient.name }}</strong>
                <div class="text-muted small">
                    ID: {{ patient.patient_id }} | Phone: {{ patient.phone_number }}
                </div>
            </div>
            <span class="badge bg-primary">Select</span>
        </div>
    </a>
    {% endfor %}
</div>
{% else %}
<div class="alert alert-info">No patients found.</div>
{% endif %}

<script>
document.querySelectorAll('.patient-select').forEach(link => {
    link.addEventListener('click', function(e) {
        e.preventDefault();

        const patientId = this.getAttribute('data-patient-id');
        const patientName = this.getAttribute('data-patient-name');
        const patientPatientId = this.getAttribute('data-patient-patient-id');
        const patientPhone = this.getAttribute('data-patient-phone');

        // Set hidden patient field
        var hiddenField = document.getElementById('id_patient');
        if (hiddenField) {
            hiddenField.value = patientId;
        }

        // Update search input
        var searchInput = document.getElementById('patientSearch');
        if (searchInput) {
            searchInput.value = patientName;
        }

        // Show selected patient info
        var nameEl = document.getElementById('patient-name');
        var pidEl = document.getElementById('patient-id');
        var phoneEl = document.getElementById('patient-phone');
        var infoEl = document.getElementById('selected-patient-info');
        var warningEl = document.getElementById('patient-required-warning');

        if (nameEl) nameEl.textContent = patientName;
        if (pidEl) pidEl.textContent = patientPatientId;
        if (phoneEl) phoneEl.textContent = patientPhone;
        if (infoEl) infoEl.style.display = 'block';
        if (warningEl) warningEl.style.display = 'none';

        // Sync Select2 dropdown if present
        var dropdown = document.getElementById('patientDropdown');
        if (dropdown && typeof $ !== 'undefined' && $(dropdown).data('select2')) {
            $(dropdown).val(patientId).trigger('change.select2');
        }

        // Clear results
        document.getElementById('patientResults').innerHTML = '';
    });
});
</script>
