{% extends "base.html" %}

{% block title %}{{ title }}{% endblock %}

{% block content %}
<div class="container-fluid">
    <div class="d-sm-flex align-items-center justify-content-between mb-4">
        <h1 class="h3 mb-0 text-gray-800">{{ title }}</h1>
        <a href="{% url 'pharmacy:bulk_store_dashboard' %}" class="btn btn-secondary">
            <i class="fas fa-arrow-left"></i> Back to Bulk Store
        </a>
    </div>

    <div class="row justify-content-center">
        <div class="col-lg-6">
            <div class="card shadow">
                <div class="card-header py-3">
                    <h6 class="m-0 font-weight-bold text-primary">Apply Markup to Bulk Store Items</h6>
                </div>
                <div class="card-body">
                    <form method="post">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label class="form-label">Bulk Store</label>
                            <select name="bulk_store_id" class="form-control">
                                <option value="">All bulk stores</option>
                                {% for store in bulk_stores %}
                                <option value="{{ store.id }}">{{ store.name }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Markup Percentage (0–100)</label>
                            <input type="number" name="markup_percentage" class="form-control"
                                   min="0" max="100" step="0.01" value="20" required>
                        </div>
                        <p class="text-muted small">Markup applies to all items in the selected bulk store.</p>
                        <button type="submit" class="btn btn-primary">Apply Markup</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
