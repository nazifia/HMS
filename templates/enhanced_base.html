{% extends 'base.html' %}
{% load static %}
{% load custom_filters %}
{% load core_tags %}

{% block title %}Hospital Management System{% endblock %}

{# ponytail: legacy "enhanced" pages now share base.html layout; only their component styles remain #}
{% block extra_head %}
<style>
    :root {
        --primary-gradient: linear-gradient(135deg, #1e3a5f 0%, #2563eb 100%);
        --accent-color: #2563eb;
    }

    .page-header {
        background: white;
        padding: 1.5rem 2rem;
        border-bottom: 1px solid #e9ecef;
        margin-bottom: 2rem;
    }

    .page-title {
        font-size: 1.75rem;
        font-weight: 700;
        color: #1a1d23;
        margin-bottom: 0.5rem;
    }

    .content-card {
        background: white;
        border-radius: 12px;
        box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        padding: 1.5rem;
        margin-bottom: 1.5rem;
        transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .content-card:hover {
        transform: translateY(-2px);
        box-shadow: 0 4px 16px rgba(0,0,0,0.12);
    }

    .stats-card {
        border-radius: 12px;
        border: none;
        padding: 1.5rem;
        position: relative;
        overflow: hidden;
        transition: all 0.3s ease;
    }

    .stats-card:hover {
        transform: translateY(-5px);
        box-shadow: 0 8px 20px rgba(0,0,0,0.15);
    }

    .stats-card::before {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 4px;
        background: var(--primary-gradient);
    }

    .stats-number {
        font-size: 2.5rem;
        font-weight: 700;
        margin-bottom: 0.25rem;
    }

    .stats-label {
        color: #6c757d;
        font-size: 0.875rem;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        font-weight: 600;
    }

    .stats-icon {
        position: absolute;
        right: 1.5rem;
        top: 1.5rem;
        font-size: 3rem;
        opacity: 0.15;
    }

    .table-modern {
        background: white;
        border-radius: 12px;
        overflow: hidden;
        box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    .table-modern thead {
        background: var(--primary-gradient);
        color: white;
    }

    .table-modern thead th {
        border: none;
        padding: 1rem;
        font-weight: 600;
        text-transform: uppercase;
        font-size: 0.875rem;
        letter-spacing: 0.5px;
    }

    .btn-primary-modern {
        background: var(--primary-gradient);
        border: none;
        padding: 0.75rem 1.5rem;
        border-radius: 8px;
        font-weight: 600;
        transition: all 0.3s ease;
    }

    .btn-primary-modern:hover {
        transform: translateY(-2px);
        box-shadow: 0 4px 12px rgba(37, 99, 235, 0.4);
    }

    .form-control-modern {
        border-radius: 8px;
        border: 1px solid #e9ecef;
        padding: 0.75rem 1rem;
        transition: all 0.2s ease;
    }

    .form-control-modern:focus {
        border-color: var(--accent-color);
        box-shadow: 0 0 0 0.2rem rgba(37, 99, 235, 0.15);
    }

    .form-label-modern {
        font-weight: 600;
        color: #1a1d23;
        margin-bottom: 0.5rem;
    }

    @keyframes fadeInUp {
        from {
            opacity: 0;
            transform: translateY(20px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    .fade-in-up {
        animation: fadeInUp 0.6s ease-out;
    }

    .loading-overlay {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: rgba(0,0,0,0.5);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 9999;
    }

    .spinner-border-modern {
        width: 3rem;
        height: 3rem;
        border-width: 3px;
    }

    .text-gradient {
        background: var(--primary-gradient);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
    }

    .border-radius-modern {
        border-radius: 12px;
    }

    .shadow-modern {
        box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
</style>
{% endblock %}
